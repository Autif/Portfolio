<section id="services" class="services">
  <div class="container">
    <div class="section-head">
      <div class="section-label">What I Do</div>
      <h2 class="section-title">Services built around <span class="cyan">real problems</span></h2>
      <p class="section-subtitle">
        From greenfield platform development to performance audits — I work across the full stack.
      </p>
    </div>

    <div class="services-grid">
      <div class="service-card card" *ngFor="let s of services">
        <div class="svc-icon" [style.background]="s.accent + '18'">{{ s.icon }}</div>
        <h3 class="svc-title">{{ s.title }}</h3>
        <p class="svc-desc">{{ s.desc }}</p>
        <ul class="svc-list">
          <li *ngFor="let b of s.bullets">
            <span class="svc-check" [style.color]="s.accent">✓</span> {{ b }}
          </li>
        </ul>
        <div class="svc-accent-bar" [style.background]="s.accent"></div>
      </div>
    </div>
  </div>
</section>
